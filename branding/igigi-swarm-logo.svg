      <path transform="translate(86,30) rotate(140) scale(0.72)" d="M0 0 L-16 -5.5 L-11 0 L-16 5.5 Z"/>
      <path transform="translate(86,74) rotate(220) scale(0.72)" d="M0 0 L-16 -5.5 L-11 0 L-16 5.5 Z"/>
      <path transform="translate(34,74) rotate(-40) scale(0.72)" d="M0 0 L-16 -5.5 L-11 0 L-16 5.5 Z"/>
    </g>
    <circle cx="60" cy="52" r="5" fill="#B87654"/>
  </g>
  <text x="160" y="272" text-anchor="middle" class="wm" font-size="60" fill="#D4A074">igigi</text>
  <text x="161" y="304" text-anchor="middle" class="lb" font-size="18" letter-spacing="14" fill="#94A0B8">swarm</text>
