<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 324" role="img" aria-label="igigi-swarm logo">
  <title>igigi-swarm</title>
  <desc>The igigi-swarm logo: an a2a-constellation mark above the wordmark igigi swarm, copper and terracotta on midnight navy.</desc>
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;display=swap');
    .wm{font-family:'Orbitron','Arial Black',sans-serif;font-weight:700}
    .lb{font-family:'Inter','Helvetica Neue',Arial,sans-serif}</style>
  </defs>
  <rect width="320" height="324" rx="28" fill="#0E1A38"/>
  <g transform="translate(55,28) scale(1.75)">
    <g stroke="#D4A074" stroke-opacity="0.45" stroke-width="1.4" stroke-linecap="round">
      <line x1="60" y1="52" x2="34" y2="30"/><line x1="60" y1="52" x2="86" y2="30"/>
      <line x1="60" y1="52" x2="34" y2="74"/><line x1="60" y1="52" x2="86" y2="74"/>
      <line x1="34" y1="30" x2="86" y2="30"/><line x1="34" y1="74" x2="86" y2="74"/>
    </g>
    <g fill="#D4A074">
